name: 启动服务并测试
on: [push, workflow_dispatch]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 启动服务（后台运行）
      - name: 启动 HTTP 服务
        run: |
          python app1.py &
          sleep 4

      # 测试访问
      - name: 访问页面
        run: |
          curl --connect-timeout 10 http://localhost:5000
          echo -e "\n✅ 访问成功！服务正常运行"

      # 测试 AI 接口
      - name: 测试 AI 应答接口
        run: |
          curl -X POST http://localhost:5000/api -d "笔记本续航很好"
          echo -e "\n✅ AI 接口正常！"
