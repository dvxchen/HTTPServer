name: 启动服务并测试访问
on: [push, workflow_dispatch]

jobs:
  run-service:
    runs-on: ubuntu-latest
    steps:
      - name: 下载代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install flask

      - name: 下载 wait-for-it 脚本（用于等待端口）
        run: |
          wget -q https://raw.githubusercontent.com/vishnubob/wait-for-it/master/wait-for-it.sh
          chmod +x wait-for-it.sh

      - name: 后台启动 Flask 服务
        run: |
          python web_chat.py &
          echo $! > server.pid  # 记录进程ID，方便后续清理

      - name: 等待服务启动（最多等待30秒）
        run: |
          ./wait-for-it.sh localhost:5000 --timeout=30 --strict -- echo "✅ 服务已就绪"

      - name: 访问服务（测试是否正常运行）
        run: |
          curl -v --connect-timeout 10 http://localhost:5000
          echo -e "\n✅ 服务访问成功！"

      - name: 清理后台进程
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) || true
          fi
