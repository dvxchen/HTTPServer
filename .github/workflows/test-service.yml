name: 启动服务并测试访问
on: [push, workflow_dispatch]

jobs:
  run-service:
    runs-on: ubuntu-latest
    steps:
      - name: 下载代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install flask

      - name: 后台启动 Flask 服务
        run: |
          python web_chat &
          sleep 3  # 等待服务启动
        shell: bash

      - name: 访问服务（测试是否正常运行）
        run: |
          curl --connect-timeout 10 http://localhost:5000
          echo -e "\n✅ 服务访问成功！"
